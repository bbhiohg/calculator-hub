<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Tip Calculator Hub</title>
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5TF2STTQGF"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-5TF2STTQGF');
</script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ====== Header ====== -->
    <header>Tip Calculator</header>

    <!-- ====== Navigation ====== -->
    <nav>
        <a href="tip-calculator.html">Tip</a>
        <a href="split-bill.html">Split Bill</a>
        <a href="budget-calculator.html">Budget</a>
        <a href="savings-calculator.html">Savings</a>
        <a href="debt-payoff.html">Debt Payoff</a>
        <a href="subscription-calculator.html">Subscription</a>
    </nav>

    <div class="container">
        <!-- ====== Tip Calculator Card ====== -->
        <div class="card">
            <label for="bill">Total Bill:</label>
            <input type="number" id="bill" placeholder="Enter total bill">

            <label for="tip">Tip Percentage:</label>
            <input type="range" id="tip" min="0" max="30" value="15" oninput="calculateTip()">
            <div>
                <button onclick="setTipPreset(10)">10%</button>
                <button onclick="setTipPreset(15)">15%</button>
                <button onclick="setTipPreset(20)">20%</button>
            </div>

            <label for="people">Number of People:</label>
            <input type="number" id="people" min="1" value="1">

            <label for="currencySelect">Currency:</label>
            <select id="currencySelect" onchange="setCurrency(this.value)">
                <option value="$">$ USD</option>
                <option value="€">€ EUR</option>
                <option value="£">£ GBP</option>
            </select>

            <button onclick="calculateTip()">Calculate Tip</button>

            <h3>Results:</h3>
            <div id="tipAmount" class="chip">Tip: $0.00</div>
            <div id="totalAmount" class="chip">Total: $0.00</div>
            <div id="perPerson" class="chip">Per Person: $0.00</div>
        </div>

        <!-- ====== History Section ====== -->
        <div class="card">
            <h3>Recent Calculations:</h3>
            <div id="tipHistory"></div>
        </div>

        <!-- ====== Pages Buttons ====== -->
        <div class="pages-buttons">
            <a href="split-bill.html"><button>Split Bill</button></a>
            <a href="budget-calculator.html"><button>Budget</button></a>
            <a href="savings-calculator.html"><button>Savings</button></a>
            <a href="debt-payoff.html"><button>Debt Payoff</button></a>
            <a href="subscription-calculator.html"><button>Subscription</button></a>
        </div>

        <!-- ====== Dark Mode Toggle ====== -->
        <div class="pages-buttons">
            <button onclick="document.body.classList.toggle('dark')">Toggle Dark Mode</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
