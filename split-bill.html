<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split Bill Calculator</title>
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5TF2STTQGF"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-5TF2STTQGF');
</script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>Split Bill Calculator</header>

    <nav>
        <a href="tip-calculator.html">Tip</a>
        <a href="split-bill.html">Split Bill</a>
        <a href="budget-calculator.html">Budget</a>
        <a href="savings-calculator.html">Savings</a>
        <a href="debt-payoff.html">Debt Payoff</a>
        <a href="subscription-calculator.html">Subscription</a>
    </nav>

    <div class="container">
        <div class="card">
            <label for="totalBill">Total Bill Amount:</label>
            <input type="number" id="totalBill" placeholder="Enter total bill">

            <label for="numPeople">Number of People:</label>
            <input type="number" id="numPeople" min="1" value="1">

            <label for="currencySelect">Currency:</label>
            <select id="currencySelect" onchange="setCurrency(this.value)">
                <option value="$">$ USD</option>
                <option value="€">€ EUR</option>
                <option value="£">£ GBP</option>
            </select>

            <button onclick="calculateSplit()">Calculate Split</button>

            <h3>Per Person:</h3>
            <div id="perPersonBill" class="chip">$0.00</div>
        </div>

        <div class="card">
            <h3>Recent Calculations:</h3>
            <div id="splitHistory"></div>
        </div>

        <div class="pages-buttons">
            <a href="tip-calculator.html"><button>Tip</button></a>
            <a href="budget-calculator.html"><button>Budget</button></a>
            <a href="savings-calculator.html"><button>Savings</button></a>
            <a href="debt-payoff.html"><button>Debt Payoff</button></a>
            <a href="subscription-calculator.html"><button>Subscription</button></a>
        </div>

        <div class="pages-buttons">
            <button onclick="document.body.classList.toggle('dark')">Toggle Dark Mode</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
