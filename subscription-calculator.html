<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>Subscription Calculator</header>

    <nav>
        <a href="tip-calculator.html">Tip</a>
        <a href="split-bill.html">Split Bill</a>
        <a href="budget-calculator.html">Budget</a>
        <a href="savings-calculator.html">Savings</a>
        <a href="debt-payoff.html">Debt Payoff</a>
        <a href="subscription-calculator.html">Subscription</a>
    </nav>

    <div class="container">
        <div class="card">
            <label for="monthlySub">Monthly Subscription Cost:</label>
            <input type="number" id="monthlySub" placeholder="Enter monthly cost">

            <label for="monthsSub">Number of Months:</label>
            <input type="number" id="monthsSub" placeholder="Enter number of months">

            <label for="currencySelect">Currency:</label>
            <select id="currencySelect" onchange="setCurrency(this.value)">
                <option value="$">$ USD</option>
                <option value="€">€ EUR</option>
                <option value="£">£ GBP</option>
            </select>

            <button onclick="calculateSubscription()">Calculate Total</button>

            <h3>Total Cost:</h3>
            <div id="totalSub" class="chip">$0.00</div>
        </div>

        <div class="card">
            <h3>Recent Calculations:</h3>
            <div id="subscriptionHistory"></div>
        </div>

        <div class="pages-buttons">
            <a href="tip-calculator.html"><button>Tip</button></a>
            <a href="split-bill.html"><button>Split Bill</button></a>
            <a href="budget-calculator.html"><button>Budget</button></a>
            <a href="savings-calculator.html"><button>Savings</button></a>
            <a href="debt-payoff.html"><button>Debt Payoff</button></a>
        </div>

        <div class="pages-buttons">
            <button onclick="document.body.classList.toggle('dark')">Toggle Dark Mode</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
